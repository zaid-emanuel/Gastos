<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Gastos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <h1>Control de Gastos</h1>
  </div>
  <script src="script.js"></script>
  <div class="app-container">
  <h1>Control de Gastos</h1>

  <section class="gasto-form">
    <input type="text" id="descripcion" placeholder="Descripción del gasto">
    <input type="number" id="monto" placeholder="Monto" min="0" step="0.01">
    <button id="btn-agregar">Agregar Gasto</button>
  </section>

  <ul id="lista-gastos"></ul>

  <p id="total">Total: $0.00</p>
</div>
</body>
</html>
