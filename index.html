<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Gastos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <h1>Control de Gastos</h1>

    <section class="gasto-form">
      <input type="text" id="descripcion" placeholder="Descripción del gasto">
      <input type="number" id="monto" placeholder="Monto" min="0" step="0.01">
      <select id="categoria">
        <option value="Comida">Comida</option>
        <option value="Transporte">Transporte</option>
        <option value="Entretenimiento">Entretenimiento</option>
        <option value="Salud">Salud</option>
        <option value="Otros">Otros</option>
      </select>
      <input type="date" id="fecha">
      <button id="btn-agregar">Agregar Gasto</button>
    </section>

    <ul id="lista-gastos"></ul>

    <p id="total">Total: $0.00</p>

    <section class="resumen-grafico">
      <h2>Resumen por categoría</h2>
      <div id="grafica-barras"></div>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
